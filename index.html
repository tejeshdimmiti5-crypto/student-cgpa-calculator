<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU SGPA & CGPA Calculator</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<h1>JNTU SGPA & CGPA Calculator</h1>

<p>Select your University and Regulation</p>

<label>University</label>

<select id="university">

<option value="JNTUK">JNTUK</option>

<option value="JNTUH">JNTUH</option>

<option value="JNTUA">JNTUA</option>

</select>

<label>Regulation</label>

<select id="regulation">

<option value="R23">R23</option>

<option value="R22">R22</option>

<option value="R20">R20</option>

<option value="R19">R19</option>

<option value="R16">R16</option>

<option value="R13">R13</option>

<option value="R10">R10</option>

</select>

<label>Calculator</label>

<select id="calculator">

<option value="sgpa">SGPA Calculator</option>

<option value="cgpa">CGPA Calculator</option>

</select>

<button onclick="continueApp()">

Continue

</button>

</div>

<script src="js/home.js"></script>

</body>
</html>
