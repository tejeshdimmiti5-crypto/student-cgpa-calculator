<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JNTU SGPA & CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>JNTU SGPA & CGPA Calculator</h1>

    <p>Select your university, regulation and calculator.</p>

    <label>University</label>

    <select id="university">
        <option>JNTUK</option>
        <option>JNTUH</option>
        <option>JNTUA</option>
    </select>

    <label>Regulation</label>

    <select id="regulation">
        <option>R23</option>
        <option>R22</option>
        <option>R20</option>
        <option>R19</option>
        <option>R16</option>
        <option>R13</option>
        <option>R10</option>
    </select>

    <h3>Choose Calculator</h3>

    <button onclick="window.location='sgpa.html'">
        SGPA Calculator
    </button>

    <button onclick="window.location='cgpa.html'">
        CGPA Calculator
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
