<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>B.Tech SGPA & CGPA Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>B.Tech SGPA & CGPA Calculator</h1>

<p>Calculate your Semester GPA (SGPA) and Overall CGPA</p>

<hr>

<h2>Student Details</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="text" id="roll" placeholder="Roll Number">

<input type="text" id="college" placeholder="College Name">

<select id="branch">

<option>AI & DS</option>
<option>CSE</option>
<option>AIML</option>
<option>ECE</option>
<option>EEE</option>
<option>IT</option>
<option>Mechanical</option>
<option>Civil</option>

</select>

<hr>

<h2>Choose Calculator</h2>

<button onclick="showSGPA()">
SGPA Calculator
</button>

<button onclick="showCGPA()">
CGPA Calculator
</button>

<div id="calculator"></div>

</div>

<script src="script.js"></script>

</body>

</html>
