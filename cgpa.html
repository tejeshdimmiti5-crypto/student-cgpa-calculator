<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>JNTU CGPA Calculator</h1>

<h3>Enter Semester SGPA</h3>

<input type="number" id="sem1" placeholder="Semester 1 SGPA" step="0.01">
<input type="number" id="sem2" placeholder="Semester 2 SGPA" step="0.01">
<input type="number" id="sem3" placeholder="Semester 3 SGPA" step="0.01">
<input type="number" id="sem4" placeholder="Semester 4 SGPA" step="0.01">
<input type="number" id="sem5" placeholder="Semester 5 SGPA" step="0.01">
<input type="number" id="sem6" placeholder="Semester 6 SGPA" step="0.01">
<input type="number" id="sem7" placeholder="Semester 7 SGPA" step="0.01">
<input type="number" id="sem8" placeholder="Semester 8 SGPA" step="0.01">

<br><br>

<button onclick="calculateCGPA()">
Calculate CGPA
</button>

<h2 id="result"></h2>

</div>

<script src="script.js"></script>

</body>
</html>
